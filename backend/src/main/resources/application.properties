# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/volunteer_platform

# JWT Configuration
# Use a strong secret key for HS256 (at least 256 bits)
jwt.secret=9a4f4c35e71234567890abcdef1234567890abcdef1234567890abcdef123456
jwt.expiration=86400000

# Security Configuration
spring.main.allow-bean-definition-overriding=true

# Logging
logging.level.org.springframework.security=DEBUG
